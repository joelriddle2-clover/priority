<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priority Scorecard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
  <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .score-btn { transition: all 0.15s ease; }
    .score-btn:hover { transform: scale(1.08); }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .bar-fill { transition: width 0.4s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script>
    var html = htm.bind(React.createElement);
    var useState = React.useState;
    var useReducer = React.useReducer;
    var useEffect = React.useEffect;
    var useMemo = React.useMemo;
    var useCallback = React.useCallback;
    var createContext = React.createContext;
    var useContext = React.useContext;
    var useRef = React.useRef;


    // ─── Utils ───────────────────────────────────────────────────────────
    function genId() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2, 11); }

    function letterGrade(appeal) {
      if (appeal >= 0.9) return 'A';
      if (appeal >= 0.8) return 'B';
      if (appeal >= 0.7) return 'C';
      if (appeal >= 0.6) return 'D';
      return 'F';
    }

    var GRADE_COLORS = {
      A: { text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200', hex: '#059669' },
      B: { text: 'text-blue-700', bg: 'bg-blue-50', border: 'border-blue-200', hex: '#2563eb' },
      C: { text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200', hex: '#d97706' },
      D: { text: 'text-orange-700', bg: 'bg-orange-50', border: 'border-orange-200', hex: '#ea580c' },
      F: { text: 'text-red-700', bg: 'bg-red-50', border: 'border-red-200', hex: '#dc2626' },
    };

    var CHART_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'];

    var SCORE_STYLES = {
      0: { active: 'bg-gray-500 text-white border-transparent shadow-md', inactive: 'bg-white text-gray-500 border-gray-300 hover:bg-gray-50' },
      1: { active: 'bg-sky-500 text-white border-transparent shadow-md', inactive: 'bg-white text-sky-600 border-sky-300 hover:bg-sky-50' },
      3: { active: 'bg-blue-600 text-white border-transparent shadow-md', inactive: 'bg-white text-blue-600 border-blue-300 hover:bg-blue-50' },
      9: { active: 'bg-indigo-600 text-white border-transparent shadow-md', inactive: 'bg-white text-indigo-600 border-indigo-300 hover:bg-indigo-50' },
    };

    // ─── Default Template ────────────────────────────────────────────────
    var defaultTemplate = {
      sections: [
        { id: 'brand', name: 'Brand', questions: [
            { id: 'b1', text: 'Does it improve our ability to deliver on NDF?' },
            { id: 'b2', text: 'Is this a TI priority?' },
            { id: 'b3', text: 'Does this influence other TIs?' },
            { id: 'b4', text: 'Does it improve our ability to support security compliance requirements?' },
            { id: 'b5', text: 'Does this maintain our brand of an available, consistent and trusted data foundation?' },
            { id: 'b6', text: 'Is it tied to a portfolio priority?' },
            { id: 'b7', text: 'Will this be a delighter for the stakeholder?' },
        ]},
        { id: 'ops', name: 'Operational Costs', questions: [
            { id: 'o1', text: 'Will an existing capability support this item?' },
            { id: 'o2', text: 'Will this work on our new tech stack?' },
            { id: 'o3', text: 'Are multiple stakeholders requesting this item?' },
            { id: 'o4', text: 'Will this improve or create a communication pathway?' },
            { id: 'o5', text: 'Will this reduce redundant work across products?' },
            { id: 'o6', text: 'Will this decrease technical debt?' },
            { id: 'o7', text: 'Will this improve NDF performance?' },
            { id: 'o8', text: 'Will this enable more than one geo?' },
            { id: 'o9', text: 'Will this automate an existing process?' },
            { id: 'o10', text: 'Can we implement automated testing for this item for future regression testing?' },
            { id: 'o11', text: 'Do we have a stakeholder available to attend demos and answer questions during development?' },
            { id: 'o12', text: 'Does this impact a single product in the Data Foundation?' },
            { id: 'o13', text: 'Do the teams have the necessary skill set or knowledge to complete this item?' },
        ]},
        { id: 'strategy', name: 'Strategy | Client Satisfaction', questions: [
            { id: 's1', text: 'Does this impact strategy?' },
            { id: 's2', text: 'Will this help us serve other functions?' },
            { id: 's3', text: 'Will this improve business/tech partner satisfaction?' },
            { id: 's4', text: 'Will this help business adoption?' },
            { id: 's5', text: 'Does this have a positive impact on strategy?' },
            { id: 's6', text: 'Does this impact another strategy?' },
        ]},
        { id: 'finance', name: 'Financial Impact', questions: [
            { id: 'f1', text: 'Will this have a positive impact on budget?' },
            { id: 'f2', text: 'Will this have a positive impact on adoption?' },
            { id: 'f3', text: 'Do we have to do this to enable the business?' },
            { id: 'f4', text: 'Does this keep us in alignment with current stakeholders?' },
        ]},
      ]
    };

    function initScores(template) {
      var scores = {};
      template.sections.forEach(function(sec) {
        scores[sec.id] = sec.questions.map(function(q) { return { questionId: q.id, score: null }; });
      });
      return scores;
    }

    // ─── Reducer ─────────────────────────────────────────────────────────
    var STORAGE_KEY = 'priority-scorecard-state';

    function loadState() {
      // Cloud room: return empty state, App will load async
      if (getRoomFromURL()) {
        return { template: defaultTemplate, workItems: [], activeWorkItemId: null };
      }
      // Check for shared URL data (legacy compressed links)
      var shared = loadFromShareURL();
      if (shared) {
        if (history.replaceState) history.replaceState(null, '', window.location.pathname);
        return shared;
      }
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) { var p = JSON.parse(raw); if (p && p.template && p.workItems) return p; }
      } catch(e) {}
      return { template: defaultTemplate, workItems: [], activeWorkItemId: null };
    }

    function reducer(state, action) {
      switch (action.type) {
        case 'ADD_WORK_ITEM': {
          var id = genId();
          var item = { id: id, name: action.payload.name, description: '', scores: initScores(state.template), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
          return Object.assign({}, state, { workItems: state.workItems.concat([item]), activeWorkItemId: id });
        }
        case 'UPDATE_WORK_ITEM':
          return Object.assign({}, state, { workItems: state.workItems.map(function(w) { return w.id === action.payload.id ? Object.assign({}, w, action.payload, { updatedAt: new Date().toISOString() }) : w; }) });
        case 'DELETE_WORK_ITEM': {
          var filtered = state.workItems.filter(function(w) { return w.id !== action.payload.id; });
          var aid = state.activeWorkItemId === action.payload.id ? (filtered.length > 0 ? filtered[0].id : null) : state.activeWorkItemId;
          return Object.assign({}, state, { workItems: filtered, activeWorkItemId: aid });
        }
        case 'DUPLICATE_WORK_ITEM': {
          var src = state.workItems.find(function(w) { return w.id === action.payload.id; });
          if (!src) return state;
          var nid = genId();
          var dup = Object.assign({}, src, { id: nid, name: src.name + ' (copy)', scores: JSON.parse(JSON.stringify(src.scores)), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
          return Object.assign({}, state, { workItems: state.workItems.concat([dup]), activeWorkItemId: nid });
        }
        case 'SET_ACTIVE':
          return Object.assign({}, state, { activeWorkItemId: action.payload.id });
        case 'SET_SCORE': {
          var p = action.payload;
          return Object.assign({}, state, {
            workItems: state.workItems.map(function(w) {
              if (w.id !== p.workItemId) return w;
              var ns = Object.assign({}, w.scores);
              ns[p.sectionId] = (ns[p.sectionId] || []).map(function(qs) { return qs.questionId === p.questionId ? { questionId: qs.questionId, score: p.score } : qs; });
              return Object.assign({}, w, { scores: ns, updatedAt: new Date().toISOString() });
            })
          });
        }
        case 'CLEAR_SCORES':
          return Object.assign({}, state, { workItems: state.workItems.map(function(w) { return w.id === action.payload.id ? Object.assign({}, w, { scores: initScores(state.template), updatedAt: new Date().toISOString() }) : w; }) });
        case 'ADD_SECTION': {
          var sec = { id: genId(), name: action.payload.name, questions: [] };
          var nt = Object.assign({}, state.template, { sections: state.template.sections.concat([sec]) });
          var ni = state.workItems.map(function(w) { var s = Object.assign({}, w.scores); s[sec.id] = []; return Object.assign({}, w, { scores: s }); });
          return Object.assign({}, state, { template: nt, workItems: ni });
        }
        case 'UPDATE_SECTION':
          return Object.assign({}, state, { template: Object.assign({}, state.template, { sections: state.template.sections.map(function(s) { return s.id === action.payload.id ? Object.assign({}, s, { name: action.payload.name }) : s; }) }) });
        case 'DELETE_SECTION': {
          var ns2 = state.template.sections.filter(function(s) { return s.id !== action.payload.id; });
          var ni2 = state.workItems.map(function(w) { var s = Object.assign({}, w.scores); delete s[action.payload.id]; return Object.assign({}, w, { scores: s }); });
          return Object.assign({}, state, { template: Object.assign({}, state.template, { sections: ns2 }), workItems: ni2 });
        }
        case 'ADD_QUESTION': {
          var q = { id: genId(), text: action.payload.text };
          var sid = action.payload.sectionId;
          var nt2 = Object.assign({}, state.template, { sections: state.template.sections.map(function(s) { return s.id === sid ? Object.assign({}, s, { questions: s.questions.concat([q]) }) : s; }) });
          var ni3 = state.workItems.map(function(w) { var sc = Object.assign({}, w.scores); sc[sid] = (sc[sid] || []).concat([{ questionId: q.id, score: null }]); return Object.assign({}, w, { scores: sc }); });
          return Object.assign({}, state, { template: nt2, workItems: ni3 });
        }
        case 'UPDATE_QUESTION':
          return Object.assign({}, state, { template: Object.assign({}, state.template, { sections: state.template.sections.map(function(s) { return s.id === action.payload.sectionId ? Object.assign({}, s, { questions: s.questions.map(function(q) { return q.id === action.payload.questionId ? Object.assign({}, q, { text: action.payload.text }) : q; }) }) : s; }) }) });
        case 'DELETE_QUESTION': {
          var sid2 = action.payload.sectionId, qid = action.payload.questionId;
          var nt3 = Object.assign({}, state.template, { sections: state.template.sections.map(function(s) { return s.id === sid2 ? Object.assign({}, s, { questions: s.questions.filter(function(q) { return q.id !== qid; }) }) : s; }) });
          var ni4 = state.workItems.map(function(w) { var sc = Object.assign({}, w.scores); sc[sid2] = (sc[sid2] || []).filter(function(qs) { return qs.questionId !== qid; }); return Object.assign({}, w, { scores: sc }); });
          return Object.assign({}, state, { template: nt3, workItems: ni4 });
        }
        case 'MOVE_SECTION': {
          var secs = state.template.sections.slice();
          var moved = secs.splice(action.payload.fromIndex, 1)[0];
          secs.splice(action.payload.toIndex, 0, moved);
          return Object.assign({}, state, { template: Object.assign({}, state.template, { sections: secs }) });
        }
        case 'RESET_TEMPLATE': {
          var ni5 = state.workItems.map(function(w) { return Object.assign({}, w, { scores: initScores(defaultTemplate), updatedAt: new Date().toISOString() }); });
          return Object.assign({}, state, { template: defaultTemplate, workItems: ni5 });
        }
        case 'IMPORT_STATE': return action.payload;
        default: return state;
      }
    }

    // ─── Context ─────────────────────────────────────────────────────────
    var AppCtx = createContext(null);
    function useApp() { return useContext(AppCtx); }

    function computeResults(state) {
      return state.workItems.map(function(item) {
        var sectionResults = state.template.sections.map(function(section) {
          var scores = item.scores[section.id] || [];
          var answered = scores.filter(function(s) { return s.score !== null; });
          var rawScore = answered.reduce(function(sum, s) { return sum + s.score; }, 0);
          var maxPossible = answered.length * 9;
          return { sectionId: section.id, sectionName: section.name, rawScore: rawScore, maxPossible: maxPossible, answeredCount: answered.length, totalQuestions: section.questions.length, appeal: maxPossible > 0 ? rawScore / maxPossible : 0 };
        });
        var appeals = sectionResults.filter(function(r) { return r.answeredCount > 0; }).map(function(r) { return r.appeal; });
        var overall = appeals.length > 0 ? appeals.reduce(function(a, b) { return a + b; }, 0) / appeals.length : 0;
        var totalQ = sectionResults.reduce(function(s, r) { return s + r.totalQuestions; }, 0);
        var totalA = sectionResults.reduce(function(s, r) { return s + r.answeredCount; }, 0);
        return { workItemId: item.id, workItemName: item.name, sectionResults: sectionResults, overallAppeal: overall, grade: letterGrade(overall), completionPct: totalQ > 0 ? totalA / totalQ : 0 };
      });
    }

    // ─── Shared Components ───────────────────────────────────────────────
    function GradeBadge(props) {
      var c = GRADE_COLORS[props.grade];
      var sz = props.size === 'lg' ? 'text-2xl px-4 py-1.5' : props.size === 'sm' ? 'text-xs px-2 py-0.5' : 'text-sm px-3 py-1';
      return html`<span className=${'font-bold rounded-lg border ' + c.text + ' ' + c.bg + ' ' + c.border + ' ' + sz}>${props.grade}</span>`;
    }

    function ProgressBar(props) {
      var val = Math.min(100, Math.max(0, props.value || 0));
      var color = props.color || 'bg-blue-500';
      return html`<div className=${'w-full bg-gray-200 rounded-full h-2 ' + (props.className || '')}>
        <div className=${'h-2 rounded-full bar-fill ' + color} style=${{ width: val + '%' }} />
      </div>`;
    }

    function ConfirmDialog(props) {
      if (!props.open) return null;
      return html`<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40" onClick=${props.onCancel}>
        <div className="bg-white rounded-xl shadow-xl p-6 max-w-sm mx-4 fade-in" onClick=${function(e) { e.stopPropagation(); }}>
          <h3 className="text-lg font-semibold text-gray-900 mb-2">${props.title}</h3>
          <p className="text-gray-600 mb-6">${props.message}</p>
          <div className="flex justify-end gap-3">
            <button onClick=${props.onCancel} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
            <button onClick=${props.onConfirm} className="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">Confirm</button>
          </div>
        </div>
      </div>`;
    }

    function EmptyState(props) {
      return html`<div className="flex flex-col items-center justify-center py-16 text-center">
        <div className="text-5xl mb-4">${props.icon}</div>
        <h3 className="text-lg font-medium text-gray-500 mb-2">${props.title}</h3>
        <p className="text-gray-400 mb-6 max-w-md">${props.message}</p>
      </div>`;
    }

    function Icon(props) {
      return html`<svg className=${props.className || 'w-4 h-4'} fill=${props.fill || 'none'} viewBox="0 0 24 24" stroke=${props.stroke || 'currentColor'}>
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${props.sw || 2} d=${props.d} />
      </svg>`;
    }

    // ─── Export Utilities ──────────────────────────────────────────────────
    function exportCSV(state, results) {
      var rows = [];
      // Header row
      var header = ['Work Item'];
      state.template.sections.forEach(function(sec) {
        header.push(sec.name + ' (%)');
        header.push(sec.name + ' (Grade)');
      });
      header.push('Overall (%)', 'Overall Grade', 'Completion (%)');
      rows.push(header);

      // Detail header with questions
      var qHeader = [''];
      state.template.sections.forEach(function(sec) {
        qHeader.push(''); qHeader.push('');
      });
      qHeader.push('', '', '');
      rows.push([]);
      rows.push(['--- Question Detail ---']);

      var qColHeader = ['Question'];
      results.forEach(function(r) { qColHeader.push(r.workItemName); });
      rows.push(qColHeader);

      state.template.sections.forEach(function(sec) {
        rows.push([sec.name + ' (' + sec.questions.length + ' questions)']);
        sec.questions.forEach(function(q) {
          var row = [q.text];
          state.workItems.forEach(function(item) {
            var sScores = item.scores[sec.id] || [];
            var qs = sScores.find(function(x) { return x.questionId === q.id; });
            row.push(qs && qs.score !== null ? qs.score : '');
          });
          rows.push(row);
        });
      });

      // Summary rows at top
      var summaryRows = [];
      results.forEach(function(r) {
        var row = [r.workItemName];
        state.template.sections.forEach(function(sec) {
          var sr = r.sectionResults.find(function(x) { return x.sectionId === sec.id; });
          row.push(sr ? Math.round(sr.appeal * 100) : 0);
          row.push(sr ? letterGrade(sr.appeal) : 'F');
        });
        row.push(Math.round(r.overallAppeal * 100), r.grade, Math.round(r.completionPct * 100));
        summaryRows.push(row);
      });

      // Insert summary rows after header
      var finalRows = [rows[0]].concat(summaryRows).concat(rows.slice(1));

      var csv = finalRows.map(function(row) {
        return row.map(function(cell) {
          var s = String(cell === undefined || cell === null ? '' : cell);
          if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
            return '"' + s.replace(/"/g, '""') + '"';
          }
          return s;
        }).join(',');
      }).join('\n');

      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'priority-scorecard-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click(); URL.revokeObjectURL(url);
    }

    function isDefaultTemplate(template) {
      if (template.sections.length !== defaultTemplate.sections.length) return false;
      for (var i = 0; i < template.sections.length; i++) {
        var a = template.sections[i], b = defaultTemplate.sections[i];
        if (a.id !== b.id || a.name !== b.name) return false;
        if (a.questions.length !== b.questions.length) return false;
        for (var j = 0; j < a.questions.length; j++) {
          if (a.questions[j].id !== b.questions[j].id || a.questions[j].text !== b.questions[j].text) return false;
        }
      }
      return true;
    }

    function generateShareURL(state) {
      var minimal = { w: [] };
      // Only include template if it's been customized
      if (!isDefaultTemplate(state.template)) {
        minimal.t = state.template.sections.map(function(sec) {
          return { i: sec.id, n: sec.name, q: sec.questions.map(function(q) { return { i: q.id, t: q.text }; }) };
        });
      }
      minimal.w = state.workItems.map(function(item) {
        var scores = {};
        Object.keys(item.scores).forEach(function(secId) {
          var answered = item.scores[secId].filter(function(s) { return s.score !== null; });
          if (answered.length > 0) {
            scores[secId] = answered.map(function(s) { return s.questionId + ':' + s.score; }).join(',');
          }
        });
        return { i: item.id, n: item.name, s: scores };
      });
      var json = JSON.stringify(minimal);
      // Compress with pako deflate then base64url encode
      var compressed = pako.deflate(json);
      var binary = '';
      for (var k = 0; k < compressed.length; k++) { binary += String.fromCharCode(compressed[k]); }
      var encoded = btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      return window.location.origin + window.location.pathname + '#z=' + encoded;
    }

    function loadFromShareURL() {
      var hash = window.location.hash;
      if (!hash) return null;
      try {
        var encoded, json;
        if (hash.indexOf('#z=') === 0) {
          // New compressed format
          encoded = hash.slice(3);
          var b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          var binary = atob(b64);
          var bytes = new Uint8Array(binary.length);
          for (var k = 0; k < binary.length; k++) { bytes[k] = binary.charCodeAt(k); }
          json = pako.inflate(bytes, { to: 'string' });
        } else if (hash.indexOf('#data=') === 0) {
          // Legacy uncompressed format
          encoded = hash.slice(6);
          json = decodeURIComponent(escape(atob(encoded)));
        } else {
          return null;
        }
        var minimal = JSON.parse(json);
        var template;
        if (minimal.t) {
          template = {
            sections: minimal.t.map(function(sec) {
              return { id: sec.i, name: sec.n, questions: sec.q.map(function(q) { return { id: q.i, text: q.t }; }) };
            })
          };
        } else {
          // Use default template if not included in the share link
          template = JSON.parse(JSON.stringify(defaultTemplate));
        }
        var workItems = minimal.w.map(function(item) {
          var scores = {};
          template.sections.forEach(function(sec) {
            scores[sec.id] = sec.questions.map(function(q) {
              var val = null;
              if (item.s[sec.id]) {
                var pairs = item.s[sec.id].split(',');
                for (var p = 0; p < pairs.length; p++) {
                  var parts = pairs[p].split(':');
                  if (parts[0] === q.id) { val = parseInt(parts[1], 10); break; }
                }
              }
              return { questionId: q.id, score: val };
            });
          });
          return { id: item.i, name: item.n, description: '', scores: scores, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
        });
        return { template: template, workItems: workItems, activeWorkItemId: workItems.length > 0 ? workItems[0].id : null };
      } catch(e) { return null; }
    }

    // ─── Cloud Room Functions (JSONBlob) ──────────────────────────────────
    var JSONBLOB_API = 'https://jsonblob.com/api/jsonBlob';

    function getRoomFromURL() {
      var hash = window.location.hash;
      if (hash && hash.indexOf('#room=') === 0) return hash.slice(6);
      return null;
    }

    function saveRoom(roomId, state) {
      if (!roomId) return Promise.resolve();
      return fetch(JSONBLOB_API + '/' + roomId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          template: state.template,
          workItems: state.workItems,
          activeWorkItemId: state.activeWorkItemId,
          updatedAt: Date.now()
        })
      });
    }

    function createRoom(state) {
      return fetch(JSONBLOB_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          template: state.template,
          workItems: state.workItems,
          activeWorkItemId: state.activeWorkItemId,
          updatedAt: Date.now()
        })
      }).then(function(resp) {
        var blobId = resp.headers.get('X-jsonblob-Id') || resp.headers.get('Location');
        if (blobId) blobId = blobId.replace(/.*\//, '');
        return blobId;
      });
    }

    // ─── SVG Charts (no Recharts) ────────────────────────────────────────
    function HBarChart(props) {
      var items = props.items || [];
      if (items.length === 0) return null;
      var rowH = 40;
      var gap = 8;
      var labelW = 150;
      var totalH = items.length * (rowH + gap);
      return html`<div style=${{ overflowX: 'auto' }}>
        <svg width="100%" height=${totalH} viewBox=${'0 0 600 ' + totalH} preserveAspectRatio="xMinYMin meet">
          ${items.map(function(item, i) {
            var y = i * (rowH + gap);
            var barW = Math.max(2, (item.value / 100) * 420);
            var barColor = item.value >= 70 ? '#059669' : item.value >= 50 ? '#d97706' : '#dc2626';
            return html`<g key=${i}>
              <text x=${labelW - 8} y=${y + rowH / 2 + 5} textAnchor="end" fontSize="13" fill="#374151" fontWeight="500">${item.name.length > 20 ? item.name.slice(0, 20) + '...' : item.name}</text>
              <rect x=${labelW} y=${y + 6} width=${barW} height=${rowH - 12} rx="6" fill=${barColor} opacity="0.85" />
              <text x=${labelW + barW + 8} y=${y + rowH / 2 + 5} fontSize="13" fill="#6b7280" fontWeight="600">${item.value}%</text>
            </g>`;
          })}
        </svg>
      </div>`;
    }

    function RadarChart(props) {
      var data = props.data || [];
      var items = props.items || [];
      if (data.length === 0 || items.length === 0) return null;

      var cx = 200, cy = 190, r = 140;
      var n = data.length;
      var angleStep = (2 * Math.PI) / n;

      function polarToXY(angle, radius) {
        return { x: cx + radius * Math.sin(angle), y: cy - radius * Math.cos(angle) };
      }

      // Grid rings
      var rings = [20, 40, 60, 80, 100];
      var gridLines = rings.map(function(pct) {
        var pts = [];
        for (var i = 0; i < n; i++) {
          var p = polarToXY(i * angleStep, (pct / 100) * r);
          pts.push(p.x + ',' + p.y);
        }
        return html`<polygon key=${pct} points=${pts.join(' ')} fill="none" stroke="#e5e7eb" strokeWidth="1" />`;
      });

      // Axis lines
      var axisLines = data.map(function(d, i) {
        var p = polarToXY(i * angleStep, r);
        return html`<line key=${i} x1=${cx} y1=${cy} x2=${p.x} y2=${p.y} stroke="#e5e7eb" strokeWidth="1" />`;
      });

      // Labels
      var labels = data.map(function(d, i) {
        var p = polarToXY(i * angleStep, r + 20);
        var anchor = p.x < cx - 10 ? 'end' : p.x > cx + 10 ? 'start' : 'middle';
        var label = d.label.length > 16 ? d.label.slice(0, 16) + '...' : d.label;
        return html`<text key=${i} x=${p.x} y=${p.y} textAnchor=${anchor} fontSize="11" fill="#6b7280">${label}</text>`;
      });

      // Data polygons
      var polys = items.map(function(item, idx) {
        var pts = data.map(function(d, i) {
          var val = d.values[item.id] || 0;
          var p = polarToXY(i * angleStep, (val / 100) * r);
          return p.x + ',' + p.y;
        });
        var color = CHART_COLORS[idx % CHART_COLORS.length];
        return html`<polygon key=${item.id} points=${pts.join(' ')} fill=${color} fillOpacity="0.12" stroke=${color} strokeWidth="2" />`;
      });

      // Legend
      var legendY = cy + r + 40;
      var legend = items.map(function(item, idx) {
        var color = CHART_COLORS[idx % CHART_COLORS.length];
        var lx = 20 + idx * 160;
        return html`<g key=${item.id}>
          <rect x=${lx} y=${legendY} width="12" height="12" rx="2" fill=${color} />
          <text x=${lx + 18} y=${legendY + 10} fontSize="12" fill="#374151">${item.name.length > 18 ? item.name.slice(0, 18) + '...' : item.name}</text>
        </g>`;
      });

      return html`<svg width="100%" height=${legendY + 30} viewBox=${'0 0 400 ' + (legendY + 30)} preserveAspectRatio="xMidYMid meet">
        ${gridLines}
        ${axisLines}
        ${polys}
        ${labels}
        ${legend}
      </svg>`;
    }

    // ─── Rankings View ───────────────────────────────────────────────────
    function RankingView() {
      var ctx = useApp();
      var state = ctx.state; var results = ctx.results;
      var ss = useState('overall'); var sortCol = ss[0]; var setSortCol = ss[1];
      var ds = useState('desc'); var sortDir = ds[0]; var setSortDir = ds[1];

      var sorted = useMemo(function() {
        var arr = results.slice();
        arr.sort(function(a, b) {
          var av, bv;
          if (sortCol === 'overall') { av = a.overallAppeal; bv = b.overallAppeal; }
          else if (sortCol === 'name') { av = a.workItemName.toLowerCase(); bv = b.workItemName.toLowerCase(); }
          else if (sortCol === 'completion') { av = a.completionPct; bv = b.completionPct; }
          else {
            var as2 = a.sectionResults.find(function(r) { return r.sectionId === sortCol; });
            var bs2 = b.sectionResults.find(function(r) { return r.sectionId === sortCol; });
            av = as2 ? as2.appeal : 0; bv = bs2 ? bs2.appeal : 0;
          }
          if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
          return sortDir === 'asc' ? av - bv : bv - av;
        });
        return arr;
      }, [results, sortCol, sortDir]);

      function handleSort(col) {
        if (sortCol === col) setSortDir(function(d) { return d === 'asc' ? 'desc' : 'asc'; });
        else { setSortCol(col); setSortDir('desc'); }
      }

      function SortHeader(p) {
        var arrow = sortCol === p.col ? (sortDir === 'asc' ? ' \u2191' : ' \u2193') : '';

      }

      var barData = sorted.map(function(r) { return { name: r.workItemName, value: Math.round(r.overallAppeal * 100) }; });

      var radarData = state.template.sections.map(function(sec) {
        var entry = { label: sec.name, values: {} };
        sorted.slice(0, 5).forEach(function(r) {
          var sr = r.sectionResults.find(function(s) { return s.sectionId === sec.id; });
          entry.values[r.workItemId] = sr ? Math.round(sr.appeal * 100) : 0;
        });
        return entry;
      });

      var radarItems = sorted.slice(0, 5).map(function(r) { return { id: r.workItemId, name: r.workItemName }; });

      return html`<div className="space-y-8 fade-in">
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div className="bg-white border border-gray-200 rounded-xl p-6">

            <${HBarChart} items=${barData} />
          </div>
          <div className="bg-white border border-gray-200 rounded-xl p-6">
            <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Section Breakdown${sorted.length > 5 ? ' (Top 5)' : ''}</h3>
            <${RadarChart} data=${radarData} items=${radarItems} />
          </div>
        </div>

        <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-gray-50 border-b border-gray-200">
                <tr>
                  <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase w-12">#</th>
                  <${SortHeader} col="name">Name<//>
                  ${state.template.sections.map(function(s) {
                    return html`<${SortHeader} key=${s.id} col=${s.id}>${s.name.length > 15 ? s.name.slice(0, 15) + '...' : s.name}<//>`;
                  })}
                  <${SortHeader} col="overall">Overall<//>
                  <${SortHeader} col="completion">Done<//>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                ${sorted.map(function(r, i) {

      { id: 'settings', label: 'Settings', d: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
    ];

    function App() {
      var sr = useReducer(reducer, null, loadState);
      var state = sr[0]; var dispatch = sr[1];
      var vs = useState('scoring'); var view = vs[0]; var setView = vs[1];
      var rs = useState(getRoomFromURL()); var roomId = rs[0]; var setRoomId = rs[1];
      var ls = useState(!!getRoomFromURL()); var loading = ls[0]; var setLoading = ls[1];
      var cloudTimer = useRef(null);
      var skipCloud = useRef(true);
      var results = useMemo(function() { return computeResults(state); }, [state.workItems, state.template.sections]);

      // Load from cloud room on mount
      useEffect(function() {
        var rid = getRoomFromURL();
        if (rid) {
          loadRoom(rid).then(function(data) {
            if (data && data.template && data.workItems) {
              dispatch({ type: 'IMPORT_STATE', payload: {
                template: data.template,
                workItems: data.workItems,
                activeWorkItemId: data.activeWorkItemId
              }});
            }
            setTimeout(function() { skipCloud.current = false; }, 100);
            setLoading(false);
          }).catch(function() {
            skipCloud.current = false;
            setLoading(false);
          });
        } else {
          skipCloud.current = false;
        }
      }, []);

      // Save to localStorage + cloud (debounced)
      useEffect(function() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
        if (roomId && !skipCloud.current) {
          if (cloudTimer.current) clearTimeout(cloudTimer.current);
          cloudTimer.current = setTimeout(function() { saveRoom(roomId, state); }, 1500);
        }
      }, [state, roomId]);

      if (loading) {
        return html`<div className="min-h-screen bg-gray-50 flex items-center justify-center">
          <div className="text-center">
            <div className="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4" style=${{ animation: 'spin 1s linear infinite' }}></div>
            <p className="text-gray-500">Loading scorecard...</p>
          </div>
        </div>`;
      }

      return html`<${AppCtx.Provider} value=${{ state: state, dispatch: dispatch, results: results, roomId: roomId, setRoomId: setRoomId }}>
        <div className="min-h-screen bg-gray-50">
          <header className="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div className="max-w-7xl mx-auto px-6">
              <div className="flex items-center justify-between h-14">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <${Icon} className="w-5 h-5 text-white" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                  </div>
                  <h1 className="text-lg font-bold text-gray-900">Priority Scorecard</h1>
                </div>
                <div className="flex items-center gap-3 text-xs text-gray-400">
                  ${roomId && html`<span className="flex items-center gap-1 text-emerald-500 bg-emerald-50 px-2 py-1 rounded-full">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>
                    Cloud
                  </span>`}
                  <span>${state.workItems.length} item${state.workItems.length !== 1 ? 's' : ''}</span>
                </div>
              </div>
              <nav className="flex gap-1 -mb-px">
                ${TABS.map(function(tab) {
                  var active = view === tab.id;
                  return html`<button key=${tab.id} onClick=${function() { setView(tab.id); }}
                    className=${'flex items-center gap-2 px-4 py-2.5 text-sm font-medium border-b-2 transition-colors ' + (active ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300')}>
                    <${Icon} className="w-4 h-4" d=${tab.d} />
                    ${tab.label}
                  </button>`;
                })}
              </nav>
            </div>
          </header>
          <main className="max-w-7xl mx-auto px-6 py-6">
            ${view === 'scoring' && html`<${ScoringView} />`}
            ${view === 'ranking' && html`<${RankingView} />`}
            ${view === 'comparison' && html`<${ComparisonView} />`}
            ${view === 'settings' && html`<${SettingsView} />`}
          </main>
        </div>
      <//>`;
    }

    // Boot
    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
